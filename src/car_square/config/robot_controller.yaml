controller_manager:
  ros__parameters:
    update_rate: 10 #Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_wheel_drive_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

omni_wheel_drive_controller:
  ros__parameters:
    wheel_names:
      - lf_joint
      - rf_joint
      - rb_joint
      - lb_joint

    # IMPORTANT : ordre anti-horaire vu du dessus
    # commence par la roue alignée avec +X (avant)

    wheel_offset: 0.7854
     
    robot_radius: 1.84        # distance centre → roue (m)
    wheel_radius: 0.31193181848        # rayon de la roue (m)

    base_frame_id: base_link
    odom_frame_id: odom

    open_loop: false           # Gazebo → OK
    position_feedback: false  # on utilise la vitesse

    use_sim_time: true

    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    publish_limited_velocity: true
